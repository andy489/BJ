<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Play BJ</title>
    <th:block th:insert="~{fragment/common::head}"></th:block>
    <link th:href="@{/css/play/bj-play.css}" rel="stylesheet">
    <link th:href="@{/css/play/choice-modal.css}" rel="stylesheet">
</head>
<body>

<header th:replace="~{fragment/common::navbar}"></header>

<div class="wrapper" th:object="${game}">
    <div class="cards-wrapper">
        <div class="game-metadata-wrapper">
            <span class="game-info">User</span>
            <div class="small-deli"></div>
            <span class="game-metadata" th:text="${#authentication.principal.username}">pesho489</span>
            <span class="deli"></span>
            <span class="game-info">Game ID</span>
            <div class="small-deli"></div>
            <span class="game-metadata"
                  th:classappend="*{hash == 'NO ID'} ? 'gray' : ''"
                  th:text="*{hash}">489489</span>
        </div>
        <div class="game-wrapper">
            <div class="row dealer-cards">
                <div class="dealer-cards-box">
                    <div class="col-12 play-card-wrapper">
                        <img th:each="c, i : *{dealerCards}"
                             th:src="@{'./../images/playing_card/' + ${c.rank} + '-' + ${c.suit} +'.png'}"
                             alt="" class="play-card"
                             th:classappend="'d-' + *{dealerCardsEven} + '-' + ${game.dDealerCards + i.index}">
                    </div>
                    <div class="score-box">
                        <span class="curr-result-user">Dealer</span>
                        <div class="small-deli"></div>
                        <span class="curr-result-box" th:text="*{dealerScore}">100</span>
                    </div>
                </div>
            </div>

            <div class="row player-cards">
                <div class="player-cards-box">
                    <div class="col-12 play-card-wrapper">
                        <img th:each="c, i : *{playerCards}"
                             th:src="@{'./../images/playing_card/' + ${c.rank} + '-' + ${c.suit} +'.png'}"
                             alt="" class="play-card"
                             th:classappend="'d-' + *{playerCardsEven} + '-' + ${game.dPlayerCards + i.index}">
                    </div>
                    <div class="score-box">
                        <div class="curr-result-user">Player</div>
                        <div class="small-deli"></div>
                        <div class="curr-result-box" th:text="*{playerScore()}">100/200</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--  CHOICE MODAL: EVEN MONEY -->
    <div class="choice-modal-wrapper row"
         th:classappend="${#lists.contains(game.availableChoices, 6) ? '' : 'd-none'}">
        <div class="modal-title col-12">
            EVEN MONEY?
        </div>
        <div class="col-6 choice-box">
            <form th:action="@{/play/even}"
                  th:method="post">
                <button type="submit" class="btn btn-decision btn-even btn-sec-dec-yes"></button>
                <input type="hidden" name="evenChoice" value="true">
                <div class="btn-cmd">
                    YES
                </div>
            </form>
        </div>
        <div class="col-6 choice-box">
            <form th:action="@{/play/even}"
                  th:method="post">
                <button type="submit" class="btn btn-decision btn-even btn-sec-dec-no"></button>
                <input type="hidden" name="evenChoice" value="false">
                <div class="btn-cmd">
                    NO
                </div>
            </form>
        </div>
    </div>
    <!--  EO:CHOICE MODAL: EVEN MONEY  -->

    <!--  CHOICE MODAL: INSURANCE  -->
    <div class="choice-modal-wrapper row"
         th:classappend="${#lists.contains(game.availableChoices, 8) ? '' : 'd-none'}">
        <div class="modal-title col-12">
            INSURANCE?
        </div>
        <div class="col-6 choice-box">
            <form th:action="@{/play/insurance}"
                  th:method="post">
                <button type="submit" class="btn btn-decision btn-sec-dec btn-sec-dec-yes"></button>
                <input type="hidden" name="insurance" value="true">
                <div class="btn-cmd">
                    YES
                </div>
            </form>
        </div>
        <div class="col-6 choice-box">
            <form th:action="@{/play/insurance}"
                  th:method="post">
                <button type="submit" class="btn btn-decision btn-sec-dec btn-sec-dec-no"></button>
                <input type="hidden" name="insurance" value="false">
                <div class="btn-cmd">
                    NO
                </div>
            </form>
        </div>
    </div>
    <!--  EO:CHOICE MODAL: INSURANCE  -->

    <!--  ERR: MODAL  -->
    <div class="err-modal-wrapper row" th:classappend="${#lists.isEmpty(game.errCodeList) ? 'd-none' : ''}">
        <div class="modal-title col-12" th:each="errCode : ${game.errCodeList}"
             th:text="#{err.code.__${errCode}__(#{min.bet},#{max.bet})}">
            Error Message
        </div>
        <div class="choice-box">
            <button type="button" class="btn btn-err btn-err-ok">
                <i class="fa-solid fa-check fa-2xl"></i>
            </button>
        </div>
        <div class="choice-box">
            <a class="go-to-link btn btn-outline-success"
               th:classappend="${#lists.contains(game.errCodeList, 1) ? '' : 'd-none'}"
               th:href="@{/credit-card/deposit}">
                GO TO DEPOSIT
            </a>
        </div>
    </div>
    <!--  EO:ERR: MODAL  -->

    <!--  DECISION  -->
    <div class="row decision-box-wrapper">
        <div class="row inner-decision-box-wrapper justify-content-center">
            <div class="col-1 decision dec-sur">
                <form th:action="@{/play/surrender}"
                      th:method="post">
                    <button type="submit" class="btn btn-decision btn-surrender"
                            th:classappend="${#lists.contains(game.availableChoices, 0) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">
                        Surrender
                    </div>
                </form>
            </div>
            <div class="col-1 decision dec-spl">
                <form action="">
                    <button type="submit" class="btn btn-decision btn-split"
                            th:classappend="${#lists.contains(game.availableChoices, 1) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">
                        Split
                    </div>
                </form>
            </div>
            <div class="col-1 decision dec-dou">
                <form action="">
                    <button type="submit" class="btn btn-decision btn-double"
                            th:classappend="${#lists.contains(game.availableChoices, 2) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">Double
                    </div>
                </form>
            </div>
            <div class="col-1 decision dec-sta">
                <form th:action="@{/play/stand}"
                      th:method="post">
                    <button type="submit" class="btn btn-decision btn-stand"
                            th:classappend="${#lists.contains(game.availableChoices, 3) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">Stand
                    </div>
                </form>
            </div>
            <div class="col-1 decision dec-hit">
                <form th:action="@{/play/hit}"
                      th:method="post">
                    <button type="submit" class="btn btn-decision btn-hit"
                            th:classappend="${#lists.contains(game.availableChoices, 4) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">
                        Hit
                    </div>
                </form>
            </div>
            <div class="col-1 decision dec-dea">
                <form th:action="@{/play/deal}"
                      th:method="post">
                    <input class="curr-bet-value" type="hidden" name="betStr" value="0.00">
                    <button type="submit" class="btn btn-decision btn-deal"
                            th:classappend="${#lists.contains(game.availableChoices, 5) ? '' : 'disabled'}">
                    </button>
                    <div class="btn-cmd">
                        Deal
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!--  EO:DECISION  -->

    <!--  BET CHIP  -->
    <div class="row chip-box-wrapper"
         th:classappend="${#lists.contains(game.availableChoices, -1) ? '' : 'd-none'}">
        <div class="row inner-chip-box-wrapper justify-content-center">
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-250">
                        <span class="chip-value">2.5</span>
                    </button>
                </form>
            </div>
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-500">
                        <span class="chip-value">5</span>
                    </button>
                </form>
            </div>
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-1000">
                        <span class="chip-value">10</span>
                    </button>
                </form>
            </div>
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-2500">
                        <span class="chip-value">25</span>
                    </button>
                </form>
            </div>
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-5000">
                        <span class="chip-value">50</span>
                    </button>
                </form>
            </div>
            <div class="col-1 chip">
                <form action="">
                    <button type="button" class="btn btn-chip chip-10000">
                        <span class="chip-value">100</span>
                    </button>
                </form>
            </div>
            <div class="col-1 bet-action">
                <form action="">
                    <button type="button" class="btn btn-bet">
                        <i class="fas fa-redo-alt fa-2x"></i>
                    </button>
                    <span>Repeat</span>
                </form>
            </div>
            <div class="col-1 bet-action">
                <form action="">
                    <button type="button" class="btn btn-bet btn-chip-double">
                        <i class="fas fa-angle-double-up fa-2x"></i>
                    </button>
                    <span>Double</span>
                </form>
            </div>
            <div class="col-1 bet-action">
                <form action="">
                    <button type="submit" class="btn btn-bet">
                        <i class="fas fa-window-close fa-2x"></i>
                    </button>
                    <span>Clear</span>
                </form>
            </div>
        </div>
    </div>
    <!--  EO:BET CHIP  -->

    <!--  BALANCE  -->
    <div class="row balance-box-wrapper">
        <div class="col-1"></div>
        <div class="col-2 cash-stat">
            <div class="balance-box-title">
                Balance
            </div>
            <div class="row balance-box-value">
                <div class="">
                    <span class="balance"
                          th:text="${#numbers.formatCurrency(game.wallet.balance)}">100.55</span>
                </div>
            </div>
        </div>
        <div class="col-2 cash-stat">
            <div class="last-bet-box-title">
                Last Win
            </div>
            <div class="row last-bet-box-value">
                <div class="">
                    <span th:text="${#numbers.formatCurrency(game.wallet.lastWin)}">1.23</span>
                </div>
            </div>
        </div>
        <div class="col-2"></div>
        <div class="col-2 cash-stat">
            <div class="curr-bet-box-title">
                Current Bet
            </div>
            <div class="row curr-bet-box-value">
                <div class="">
                    <span class="curr-bet"
                          th:text="${#numbers.formatCurrency(game.wallet.currentBet)}">1.23</span>
                </div>
            </div>
        </div>
        <div class="col-2 bet-legend">
            <div>
                <span>Min bet:</span>
                <span th:text="${#numbers.formatCurrency(10)}">10</span>
            </div>
            <div>
                <span>Max bet:</span>
                <span th:text="${#numbers.formatCurrency(1000)}">1000</span>
            </div>
        </div>
        <div class="col-1"></div>
    </div>
    <!--  EO:BALANCE  -->
</div>

<!--<div id="dimmer"></div>-->
<script defer th:src="@{/js/jquery/jquery.js}"></script>
<script defer th:src="@{/js/play/bj-play.js}"></script>
</body>
</html>
