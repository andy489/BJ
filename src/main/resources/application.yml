spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: BJ
  main:
    banner-mode: off
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/bjdb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      jakarta:
        persistence:
          shared-cache:
            mode: UNSPECIFIED
      hibernate:
        format_sql: true
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml
  mvc:
    hidden-method:
      filter:
        enabled: true

google.recaptcha:
  enabled: true
  site: ${RECAPTCHA_SITE_KEY:6LftLZQpAAAAABngcJW_QJ-hZ3XCfb8GqAisD0s5}
  secret: ${RECAPTCHA_SITE_SECRET:6LftLZQpAAAAAOo1uLD7ocJ_TudnvG578TfkAGK3}

auth:
  register:
    auto-login: false
  login:
    remember-me-key: ${REMEMBER_ME_KEY:1234}
  activation-token:
    cleanup-cron: "*/60 */10 * * * *"
    expires-after-minutes: 60
  forgot-password-token:
    cleanup-cron: "*/60 */10 * * * *"
    expires-after-minutes: 30

# mail-hog: "localhost:8025"
mail:
  app-mail: ${APP_MAIL:blackjack@bj.com}
  host: ${MAIL_HOST:localhost}
  port: ${MAIL_PORT:1025}
  username: ${MAIL_USER:root}
  password: ${MAIL_PASS:root}
  smtp-auth: true
  transport-protocol: smtp

logging:
  level:
    org:
      springframework:
        security: INFO